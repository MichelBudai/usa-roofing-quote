name: Deploy roofing static site
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Clean build dirs
        run: rm -rf .next out

      - name: Build (Next export)
        env:
          SITE_SLUG: roofing
        run: npx next build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing GitHub Secret: VPS_SSH_PRIVATE_KEY."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote dir exists
        run: |
          ssh -o StrictHostKeyChecking=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '/var/www/roofing-static'"

      - name: Upload out/ via rsync
        run: |
          rsync -az --delete ./out/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/roofing-static/"

      - name: Reload nginx
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "nginx -t && systemctl reload nginx"
