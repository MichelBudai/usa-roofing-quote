name: Deploy roofing static site
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx next build
        env:
          SITE_SLUG: roofing
      - name: Generate split sitemaps
        run: node generate-sitemaps-ci.js
      - name: Deploy to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${VPS_PASSWORD}" rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" ./out/ root@187.124.147.244:/var/www/roofing-static/
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=60 root@187.124.147.244 'find /var/www/roofing-static/ -name "*.html" -exec gzip --best {} \; ; find /var/www/roofing-static/ -name "*.html.gz" | while read f; do mv "$f" "${f%.gz}"; done ; find /var/www/roofing-static/ -name "*.txt" ! -name "robots.txt" ! -name "llms.txt" -exec gzip --best {} \; ; find /var/www/roofing-static/ -name "*.txt.gz" | while read f; do mv "$f" "${f%.gz}"; done ; nginx -t && systemctl reload nginx'
